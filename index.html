<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weight Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Weight Tracker</h1>
      <p class="subtitle">Track bodyweight over time</p>
    </header>

    <section class="card form-section">
      <form id="entry-form" autocomplete="off">
        <div class="form-row">
          <div class="field name-field">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="e.g. Alice" required>
          </div>
          <div class="field weight-field">
            <label for="weight">Weight</label>
            <input type="number" id="weight" step="0.1" placeholder="kg" required>
          </div>
          <div class="field unit-field">
            <label>Unit</label>
            <div class="toggle-group">
              <button type="button" class="toggle-btn active" data-unit="kg">kg</button>
              <button type="button" class="toggle-btn" data-unit="lbs">lbs</button>
            </div>
          </div>
          <div class="field color-field">
            <label for="color">Color</label>
            <input type="color" id="color" value="#4A90D9">
          </div>
          <div class="field submit-field">
            <button type="submit" id="submit-btn">Add Entry</button>
          </div>
        </div>
      </form>
    </section>

    <div id="error" class="error card hidden"></div>

    <section class="card chart-section">
      <div id="loading">Loading data...</div>
      <canvas id="weight-chart" class="hidden"></canvas>
      <div id="chart-empty" class="empty-state hidden">No entries yet. Add your first weight above!</div>
    </section>

    <section class="card table-section">
      <table id="entries-table">
        <thead>
          <tr>
            <th>Date &amp; Time (IST)</th>
            <th>Name</th>
            <th>Weight</th>
            <th>Color</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div id="table-empty" class="empty-state">No entries yet.</div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
